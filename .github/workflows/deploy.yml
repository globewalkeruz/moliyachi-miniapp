name: CI / Deploy to Render

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: test          # only deploy if tests pass
    steps:
      - name: Deploy
        run: |
          DEPLOY=$(curl -sf -X POST \
            "https://api.render.com/v1/services/srv-d8qgrd3tqb8s73bmgeg0/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Deploy triggered: $(echo $DEPLOY | grep -o '\"id\":\"[^\"]*\"' | head -1)"

      - name: Wait for live
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -sf \
              "https://api.render.com/v1/services/srv-d8qgrd3tqb8s73bmgeg0/deploys?limit=1" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              | grep -o '"status":"[^"]*"' | head -1)
            echo "  $STATUS"
            echo "$STATUS" | grep -qE '"(live|failed)"' && break
            sleep 15
          done
          echo "$STATUS" | grep -q '"live"' && echo "✅ Deploy live" || { echo "❌ Deploy failed"; exit 1; }
